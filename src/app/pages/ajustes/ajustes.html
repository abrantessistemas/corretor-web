<div class="settings-container">
  <header class="settings-header">
    <h1>Configurações</h1>
    <p>Personalize a identidade visual da sua plataforma de corretagem.</p>
  </header>

  <div class="settings-grid">
    <!-- Cartão de Cores e Tema -->
    <mat-card class="settings-card" appearance="outlined">
      <mat-card-header>
        <mat-icon mat-card-avatar color="primary">palette</mat-icon>
        <mat-card-title>Personalização de Cores</mat-card-title>
        <mat-card-subtitle>Selecione a cor principal do sistema</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <div class="color-grid">
          @for (color of primaryColors(); track color.hex) {
          <div class="color-item">
            <button mat-fab [style.background-color]="color.hex" (click)="setThemeColor(color.hex)" class="color-btn">
              @if (currentPrimary() === color.hex) {
              <mat-icon>check</mat-icon>
              }
            </button>
            <span class="color-name">{{ color.name }}</span>
          </div>
          }
        </div>

        <mat-divider class="my-4"></mat-divider>

        <div class="toggle-row">
          <div class="label-group">
            <h3>Modo Escuro</h3>
            <p>Reduz o cansaço visual em ambientes de baixa luz</p>
          </div>
          <mat-slide-toggle [checked]="isDarkMode()" (change)="toggleDark()">
          </mat-slide-toggle>
        </div>
      </mat-card-content>
    </mat-card>
