<div class="container">
    <header class="hero-section" style="display: none;">
        <h1 class="color-text">Bem-vindo</h1>
        <p style="color: yellow;">Sua plataforma moderna de gestão imobiliária.</p>
    </header>

    <div class="grid" >
        <mat-card class="dashboard-card">
            <mat-card-header>
                <mat-icon mat-card-avatar class="color-text">home</mat-icon>
                <mat-card-title>Imóveis Ativos</mat-card-title>
                <mat-card-subtitle>Resumo do inventário</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
                <p class="stat-number color-text">{{totalProperties()}}</p>
            </mat-card-content>
            <mat-card-actions>
                <button mat-button color="primary" routerLink="/imoveis">VER TODOS</button>
            </mat-card-actions>
        </mat-card>

        <mat-card class="dashboard-card">
            <mat-card-header>
                <mat-icon mat-card-avatar class="color-text">assignment_ind</mat-icon>
                <mat-card-title>Novos Clientes</mat-card-title>
                <mat-card-subtitle>Últimos 7 dias</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
                <p class="stat-number color-text">12</p>
            </mat-card-content>
            <mat-card-actions>
                <button mat-button color="accent">GERENCIAR LEADS</button>
            </mat-card-actions>
        </mat-card>
    </div>
    <br>
    <app-property-list></app-property-list>
</div>
