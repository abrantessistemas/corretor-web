<div class="form-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Cadastro de Corretor</mat-card-title>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="corretorForm" (ngSubmit)="onSubmit()" class="responsive-grid">

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Nome Completo</mat-label>
                    <input matInput formControlName="nome" placeholder="Ex: João Silva">
                    @if (corretorForm.get('nome')?.invalid) {
                    <mat-error>Nome é obrigatório</mat-error>
                    }
                </mat-form-field>

                <div class="row">
                    <mat-form-field appearance="outline">
                        <mat-label>E-mail</mat-label>
                        <input matInput type="email" formControlName="email" placeholder="email@exemplo.com">
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label>Telefone / Celular</mat-label>
                        <input matInput formControlName="telefone" placeholder="(11) 99999-9999" mask="(00) 00000-0000"
                            [dropSpecialCharacters]="false">
                    </mat-form-field>
                </div>

                <div class="row-three">
                    <mat-form-field appearance="outline">
                        <mat-label>Gênero</mat-label>
                        <mat-select formControlName="genero">
                            <mat-option value="M">Masculino</mat-option>
                            <mat-option value="F">Feminino</mat-option>
                            <mat-option value="O">Outro</mat-option>
                        </mat-select>
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label>UF</mat-label>
                        <mat-select formControlName="uf">
                            @for (estado of estados; track estado) {
                            <mat-option [value]="estado">{{estado}}</mat-option>
                            }
                        </mat-select>
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label>CRECI</mat-label>
                        <input matInput formControlName="creci" placeholder="000.000-F">
                    </mat-form-field>
                </div>

                <div class="actions">
                    <button mat-flat-button color="primary" type="submit" [disabled]="corretorForm.invalid">
                        Cadastrar Corretor
                    </button>
                </div>

            </form>
        </mat-card-content>
    </mat-card>
</div>
